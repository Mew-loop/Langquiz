<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LangQuiz Pro & AI Voice</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ==========================================
           FLUID & GLASSMORPHISM THEME
           ========================================== */
        :root {
            --bg-surface: rgba(20, 20, 22, 0.4);
            --bg-surface-elevated: rgba(30, 30, 35, 0.5);
            --border-subtle: rgba(255, 255, 255, 0.08);
            
            --accent-blue: #3b82f6;
            --accent-green: rgba(46, 204, 113, 0.15);
            --accent-green-border: rgba(46, 204, 113, 0.5);
            --accent-green-text: #4ade80;
            --accent-green-solid: #2ecc71;
            
            --accent-red: rgba(239, 68, 68, 0.15);
            --accent-red-border: rgba(239, 68, 68, 0.5);
            --accent-red-text: #f87171;
            
            --accent-gold: #fbbf24;
            
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.5);
            
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
        }

        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Vazirmatn", sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: linear-gradient(-45deg, #090a0f, #111827, #0d131f, #0f0c1b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-primary); 
            height: 100dvh; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container { 
            width: 100%; max-width: 440px; height: 100%; 
            display: flex; flex-direction: column; position: relative; 
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        .glass {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-subtle);
        }

        /* ==========================================
           HEADER & XP BAR
           ========================================== */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 24px; flex-shrink: 0; z-index: 10;
        }
        .header-stats { display: flex; gap: 20px; align-items: center; }
        
        .stat-item { display: flex; flex-direction: column; gap: 2px; }
        .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
        
        .xp-row { display: flex; align-items: center; gap: 8px; }
        .stat-val { font-size: 16px; font-weight: 700; }
        .mini-xp-bar { width: 50px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .mini-xp-fill { height: 100%; background: var(--text-primary); width: 0%; transition: width 0.4s ease; }
        
        .streak-fire { color: #ff9f0a; font-size: 14px; margin-right: 4px; }
        .bonus-badge {
            background: rgba(251, 191, 36, 0.2);
            color: var(--accent-gold);
            font-size: 10px; font-weight: bold;
            padding: 2px 6px; border-radius: 8px;
            margin-left: 6px; display: none;
        }
        
        .header-actions { display: flex; gap: 8px; }
        .icon-btn { 
            width: 40px; height: 40px; border-radius: 50%; font-size: 16px; 
            display: flex; justify-content: center; align-items: center; 
            cursor: pointer; transition: 0.2s; color: var(--text-primary);
        }
        .icon-btn:active { transform: scale(0.9); background: var(--bg-surface-elevated); }

        /* ==========================================
           SCREENS & ANIMATIONS
           ========================================== */
        .screen { 
            display: none; flex-direction: column; flex: 1; 
            padding: 0 24px 100px 24px; overflow-y: auto; overflow-x: hidden;
        }
        .screen.active { display: flex; }
        
        .animate-up { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .wizard-title { font-size: 28px; font-weight: 700; letter-spacing: -1px; margin: 40px 0 30px; }
        .lang-grid { display: flex; flex-direction: column; gap: 12px; }
        .lang-btn { 
            padding: 20px; border-radius: var(--radius-md); 
            color: var(--text-primary); font-size: 17px; font-weight: 500; 
            display: flex; align-items: center; gap: 16px; 
            cursor: pointer; transition: all 0.2s; text-align: left;
        }
        .lang-btn .emoji { font-size: 24px; }
        .lang-btn:active { transform: scale(0.97); background: var(--bg-surface-elevated); }

        /* ==========================================
           QUIZ INTERFACE
           ========================================== */
        .quiz-wrapper { 
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; gap: 50px;
            position: relative;
        }
        
        .inline-loader-container {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .loader { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--text-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        
        .quiz-content { width: 100%; display: flex; flex-direction: column; gap: 50px; transition: opacity 0.3s; }
        .question-section { text-align: center; width: 100%; }
        .direction-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
        
        .word-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .question-word { 
            font-size: 42px; font-weight: 800; letter-spacing: -1.5px; 
            line-height: 1.2; margin: 0; color: var(--text-primary);
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .highlight-word { color: var(--accent-blue); }

        .speaker-btn { 
            background: transparent; border: none; 
            color: var(--text-secondary); font-size: 24px; 
            cursor: pointer; transition: 0.2s;
        }
        .speaker-btn:active { transform: scale(0.8); color: var(--text-primary); }
        .speaker-btn.playing { animation: pulse 1s infinite; color: var(--text-primary); }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; }
        .option-btn { 
            color: var(--text-primary); padding: 24px 16px; 
            border-radius: var(--radius-lg); font-size: 16px; font-weight: 500; 
            cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; align-items: center; justify-content: center; text-align: center;
            min-height: 80px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .option-btn:active { transform: scale(0.95); background: var(--bg-surface-elevated); }
        
        .option-btn.correct { 
            background: var(--accent-green); border-color: var(--accent-green-border); 
            color: var(--accent-green-text); font-weight: 600; transform: scale(1.02);
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.1);
        }
        .option-btn.wrong { 
            background: var(--accent-red); border-color: var(--accent-red-border); 
            color: var(--accent-red-text); font-weight: 600; animation: shakeX 0.4s;
        }

        /* ==========================================
           LEADERBOARD INTERFACE
           ========================================== */
        .page-header { font-size: 28px; font-weight: 700; letter-spacing: -1px; margin: 20px 0 30px; }
        .leaderboard-list { display: flex; flex-direction: column; gap: 12px; }
        .lb-item {
            display: flex; align-items: center; padding: 16px; 
            border-radius: var(--radius-md); gap: 16px;
        }
        .lb-item.is-me {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.4);
        }
        .lb-rank { font-size: 18px; font-weight: 700; width: 30px; text-align: center; color: var(--text-secondary); }
        .lb-rank.gold { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.4); }
        .lb-rank.silver { color: #94a3b8; }
        .lb-rank.bronze { color: #b45309; }
        .lb-avatar { font-size: 24px; }
        .lb-info { flex: 1; display: flex; flex-direction: column; }
        .lb-name { font-size: 15px; font-weight: 600; color: var(--text-primary); }
        .lb-xp { font-size: 13px; color: var(--accent-blue); font-weight: 500; margin-top: 2px;}

        /* ==========================================
           DASHBOARD & STATS
           ========================================== */
        .dash-card { border-radius: var(--radius-lg); padding: 24px; margin-bottom: 16px; }
        .dash-card h3 { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 24px; }
        .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .stat-block { display: flex; flex-direction: column; gap: 4px; }
        .stat-block .num { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
        .stat-block .lbl { font-size: 11px; color: var(--text-secondary); }
        .chart-canvas { width: 100%; height: 120px; }
        .activity-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 10px; }
        .activity-day {
            aspect-ratio: 1; border-radius: 6px; background: rgba(255, 255, 255, 0.05);
            display: flex; justify-content: center; align-items: center;
            font-size: 10px; color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.02);
        }
        .activity-day.active { background: var(--accent-green-solid); color: #000; font-weight: bold; box-shadow: 0 0 10px rgba(46, 204, 113, 0.4); border: none; }

        /* ==========================================
           BOTTOM NAVIGATION
           ========================================== */
        .bottom-nav { 
            position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); 
            padding: 8px; border-radius: 100px; display: none; gap: 8px; z-index: 50; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .nav-btn { 
            width: 50px; height: 50px; background: transparent; border: none; 
            color: var(--text-secondary); font-size: 20px; border-radius: 50%; 
            cursor: pointer; transition: all 0.3s; display: flex; justify-content: center; align-items: center; 
        }
        .nav-btn.active { background: rgba(255,255,255,0.1); color: var(--text-primary); }

        /* ==========================================
           MODALS & ANIMATIONS
           ========================================== */
        #settings-modal { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); 
            display: none; justify-content: center; align-items: center; z-index: 100; padding: 24px; 
        }
        .modal-content { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 12px; }
        .modal-btn { 
            padding: 18px; border-radius: var(--radius-md); font-size: 15px; font-weight: 500; cursor: pointer; text-align: left; color: var(--text-primary);
        }
        .close-btn { 
            background: var(--text-primary); color: #000; border: none; padding: 18px; border-radius: var(--radius-md); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 12px; text-align: center;
        }
        .error-box { display: none; color: var(--accent-red-text); background: rgba(239, 68, 68, 0.1); border: 1px solid var(--accent-red-border); padding: 16px; border-radius: var(--radius-sm); margin-top: 20px; font-size: 14px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes shakeX { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-8px);} 75% {transform: translateX(8px);} }
    </style>
</head>
<body>
    
    <div class="app-container">
        <!-- Header -->
        <div class="header" id="main-header" style="display: none;">
            <div class="header-stats">
                <div class="stat-item">
                    <span class="stat-label">Level <span id="dash-level-header">1</span></span>
                    <div class="xp-row">
                        <span class="stat-val" id="score-display">0</span>
                        <div class="mini-xp-bar"><div class="mini-xp-fill" id="xp-bar-fill"></div></div>
                    </div>
                </div>
                <div class="stat-item" style="flex-direction: row; align-items: center; position: relative;">
                    <span class="streak-fire">🔥</span>
                    <span class="stat-val" id="streak-display" style="font-size: 18px;">0</span>
                    <span class="bonus-badge" id="bonus-badge">+0%</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn glass" onclick="toggleSettings()" title="Settings">⚙</button>
            </div>
        </div>

        <!-- Full Page Loading -->
        <div id="loading-screen" class="screen active animate-up" style="justify-content: center; align-items: center;">
            <div class="loader"></div>
            <h3 id="loading-text" style="color: var(--text-secondary); margin-top:16px; font-weight: 500; font-size: 14px;">Syncing data...</h3>
            <div id="error-box" class="error-box"></div>
        </div>

        <!-- Wizard Screen -->
        <div id="wizard-screen" class="screen animate-up">
            <h2 class="wizard-title" id="wizard-title">Select Language</h2>
            <div class="lang-grid" id="lang-grid"></div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen animate-up">
            <div class="quiz-wrapper" id="quiz-wrapper">
                <div class="inline-loader-container" id="inline-loader">
                    <div class="loader"></div>
                </div>

                <div class="quiz-content" id="quiz-content">
                    <div class="question-section">
                        <div class="direction-label" id="translation-direction">ENG TO PER</div>
                        <div class="word-wrapper">
                            <h1 class="question-word" id="word-display">...</h1>
                            <button class="speaker-btn" id="speaker-btn" onclick="replayAudio()">🔊</button>
                        </div>
                    </div>
                    <div class="options-grid" id="options-container"></div>
                </div>
            </div>
        </div>

        <!-- Leaderboard Screen -->
        <div id="leaderboard-screen" class="screen animate-up">
            <h2 class="page-header">Leaderboard</h2>
            <div class="leaderboard-list" id="leaderboard-list">
                <!-- Renders Dynamically -->
            </div>
        </div>

        <!-- Dashboard Screen -->
        <div id="dashboard-screen" class="screen animate-up">
            <h2 class="page-header">Activity</h2>
            
            <div class="dash-card glass">
                <h3>Overview</h3>
                <div class="stats-row">
                    <div class="stat-block"><span class="num" id="dash-level">1</span><span class="lbl">Current Level</span></div>
                    <div class="stat-block"><span class="num" id="dash-xp">0</span><span class="lbl">Total XP</span></div>
                    <div class="stat-block"><span class="num" id="dash-accuracy">0%</span><span class="lbl">Accuracy</span></div>
                    <div class="stat-block"><span class="num" id="dash-best-streak">0</span><span class="lbl">Best Streak</span></div>
                </div>
            </div>

            <div class="dash-card glass">
                <h3>Weekly Usage</h3>
                <canvas class="chart-canvas" id="weekly-chart"></canvas>
            </div>
            
            <div class="dash-card glass" id="activity-heatmap-card">
                <h3 id="month-title">This Month</h3>
                <div class="activity-grid" id="activity-grid"></div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav glass" id="bottom-nav">
            <button class="nav-btn active" id="nav-word" onclick="switchMode('word')">📝</button>
            <button class="nav-btn" id="nav-sentence" onclick="switchMode('sentence')">💬</button>
            <div style="width: 1px; background: var(--border-subtle); margin: 6px 4px;"></div>
            <button class="nav-btn" id="nav-leaderboard-btn" onclick="toggleScreen('leaderboard')">🏆</button>
            <button class="nav-btn" id="nav-toggle-btn" onclick="toggleScreen('dashboard')">📈</button>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal">
            <div class="modal-content animate-up">
                <button class="modal-btn glass" id="sound-toggle" onclick="toggleSound()">Sound Effects: ON</button>
                <button class="modal-btn glass" id="tts-toggle" onclick="toggleTTS()">AI Pronunciation: ON</button>
                <button class="modal-btn glass" onclick="resetLanguages()">Change Languages</button>
                <button class="modal-btn glass" style="color: var(--accent-red-text);" onclick="resetScore()">Reset Progress</button>
                <button class="close-btn" onclick="toggleSettings()">Done</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxaFlDv6NHyQBZS1B5r8yu_0qwxU74cPNvm4YpVaLenCXleOQIDcQelXCDYVlb9wuVQ/exec'; 
        const LANGUAGES = [
            { id: 0, name: "فارسی", emoji: "🇮🇷", ttsCode: "fa" },
            { id: 1, name: "English", emoji: "🇬🇧", ttsCode: "en" },
            { id: 2, name: "Русский", emoji: "🇷🇺", ttsCode: "ru" }
        ];
        
        // XP Configuration
        const XP_BASE_WORD = 10;
        const XP_BASE_SENTENCE = 20;
        const XP_PENALTY_WORD = 70;
        const XP_PENALTY_SENTENCE = 10;
        
        const LEVEL_THRESHOLDS = [0, 500, 1200, 2500, 4500, 7000, 10000, 15000, 25000];

        let dbMatrix = [];
        let currentScreen = 'quiz';
        let wizardStep = 1;
        let currentWordIndex = -1;
        let canAnswer = true;
        let currentRawTextForSpeech = "";
        
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let sfxCtx = null;

        function loadState() {
            const defaults = { score: 0, streak: 0, bestStreak: 0, sourceLang: null, targetLang: null, soundOn: true, ttsOn: true, mode: 'word', totalCorrect: 0, totalWrong: 0, usageData: {} };
            const s = {};
            for (const k in defaults) {
                const v = localStorage.getItem(k);
                if (v !== null) { try { s[k] = JSON.parse(v); } catch { s[k] = v; } }
                else s[k] = defaults[k];
            }
            s.score = parseInt(s.score) || 0;
            s.streak = parseInt(s.streak) || 0;
            if(!s.usageData) s.usageData = {};
            return s;
        }
        let state = loadState();

        function getLevel(xp) {
            for (let i = LEVEL_THRESHOLDS.length - 1; i >= 0; i--) {
                if (xp >= LEVEL_THRESHOLDS[i]) return i + 1;
            }
            return 1;
        }

        // ---------- Hybrid Text-to-Speech System ----------
        function playTTS(text, shortLangCode) {
            if (!state.ttsOn || !text) return;
            
            const btn = document.getElementById('speaker-btn');
            btn.classList.add('playing');
            let fallbackTriggered = false;
            
            const triggerFallback = () => {
                if (fallbackTriggered) return;
                fallbackTriggered = true;
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); 
                    const utterance = new SpeechSynthesisUtterance(text);
                    if (shortLangCode === 'en') utterance.lang = 'en-US';
                    else if (shortLangCode === 'ru') utterance.lang = 'ru-RU';
                    else utterance.lang = 'fa-IR';
                    
                    utterance.onend = () => btn.classList.remove('playing');
                    utterance.onerror = () => btn.classList.remove('playing');
                    window.speechSynthesis.speak(utterance);
                } else {
                    btn.classList.remove('playing');
                }
            };

            const cloudUrl = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=${shortLangCode}&q=${encodeURIComponent(text)}`;
            const audio = new Audio(cloudUrl);
            audio.onended = () => btn.classList.remove('playing');
            audio.onerror = triggerFallback;
            
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(triggerFallback);
            }
        }

        // ---------- Sound Effects System ----------
        function playSfx(type) {
            if (!state.soundOn) return;
            if (!sfxCtx) sfxCtx = new AudioContext();
            if (sfxCtx.state === 'suspended') sfxCtx.resume();
            
            const osc = sfxCtx.createOscillator();
            const gain = sfxCtx.createGain();
            osc.connect(gain);
            gain.connect(sfxCtx.destination);
            const now = sfxCtx.currentTime;
            
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(500, now); osc.frequency.exponentialRampToValueAtTime(1000, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(150, now + 0.2);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

        // ---------- Core Game UI ----------
        function updateXPUI() {
            const level = getLevel(state.score);
            const prev = LEVEL_THRESHOLDS[Math.max(0, level - 1)];
            const next = LEVEL_THRESHOLDS[Math.min(level, LEVEL_THRESHOLDS.length - 1)] || prev + 1000;
            const pct = Math.min(100, Math.max(0, ((state.score - prev) / (next - prev)) * 100));
            
            document.getElementById('score-display').innerText = state.score;
            document.getElementById('dash-level-header').innerText = level;
            document.getElementById('streak-display').innerText = state.streak;
            document.getElementById('xp-bar-fill').style.width = pct + '%';

            const badge = document.getElementById('bonus-badge');
            let bonusMulti = Math.min(Math.floor(state.streak / 4) * 0.2, 1.0);
            if (bonusMulti > 0) {
                badge.innerText = "+" + (bonusMulti * 100) + "%";
                badge.style.display = "inline-block";
            } else {
                badge.style.display = "none";
            }
        }

        function saveState() {
            for (const k in state) {
                localStorage.setItem(k, typeof state[k] === 'object' ? JSON.stringify(state[k]) : state[k]);
            }
        }

        function trackUsage() {
            const now = new Date();
            const monthKey = `${now.getFullYear()}-${now.getMonth()}`;
            const dayKey = now.getDate();
            if(!state.usageData[monthKey]) state.usageData[monthKey] = [];
            if(!state.usageData[monthKey].includes(dayKey)) {
                state.usageData[monthKey].push(dayKey);
                saveState();
            }
        }

        async function init() {
            updateXPUI();
            trackUsage();
            document.getElementById('sound-toggle').innerText = state.soundOn ? "Sound Effects: ON" : "Sound Effects: OFF";
            document.getElementById('tts-toggle').innerText = state.ttsOn ? "AI Pronunciation: ON" : "AI Pronunciation: OFF";
            
            if (state.sourceLang !== null && state.targetLang !== null) {
                await fetchDatabase(state.mode);
            } else {
                startWizard();
            }
        }

        async function fetchDatabase(mode) {
            const isInitialized = dbMatrix.length > 0;
            if (isInitialized) {
                document.getElementById('quiz-content').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('quiz-content').style.display = 'none';
                    document.getElementById('inline-loader').style.display = 'flex';
                }, 300);
            } else {
                showScreen('loading-screen');
                document.getElementById('bottom-nav').style.display = 'none';
                document.getElementById('main-header').style.display = 'none';
            }

            try {
                const response = await fetch(`${API_URL}${API_URL.includes('?') ? '&' : '?'}mode=${mode}`);
                const data = await response.json();
                if (data && data.length > 0) dbMatrix = data;
            } catch (e) { console.warn("Fetch Error", e); }

            if (dbMatrix.length > 0) {
                document.getElementById('main-header').style.display = 'flex';
                document.getElementById('bottom-nav').style.display = 'flex';
                currentScreen = 'quiz';
                
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('nav-' + mode).classList.add('active');
                
                showScreen('quiz-screen');
                await loadQuestion();

                document.getElementById('inline-loader').style.display = 'none';
                document.getElementById('quiz-content').style.display = 'flex';
                setTimeout(() => document.getElementById('quiz-content').style.opacity = '1', 50);
            } else {
                document.getElementById('loading-text').style.display = 'none';
                document.getElementById('error-box').innerText = "خطا در دریافت اطلاعات.";
                document.getElementById('error-box').style.display = 'block';
            }
        }

        function triggerAnimation(elementId) {
            const el = document.getElementById(elementId);
            if(el) {
                el.classList.remove('animate-up');
                void el.offsetWidth;
                el.classList.add('animate-up');
            }
        }

        function switchMode(newMode) {
            if (state.mode === newMode && currentScreen === 'quiz') return;
            state.mode = newMode;
            if(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }
            if(currentScreen !== 'quiz') showScreen('quiz-screen'); 
            else triggerAnimation('quiz-wrapper');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + newMode).classList.add('active');
            
            fetchDatabase(newMode);
        }

        function toggleScreen(targetScreen) {
            if(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            if (currentScreen === targetScreen) {
                currentScreen = 'quiz';
                document.getElementById('nav-' + state.mode).classList.add('active');
                showScreen('quiz-screen');
                triggerAnimation('quiz-wrapper');
            } else {
                currentScreen = targetScreen;
                document.getElementById('nav-' + targetScreen + '-btn').classList.add('active');
                showScreen(targetScreen + '-screen');
                triggerAnimation(targetScreen + '-screen');
                
                if (targetScreen === 'dashboard') renderDashboard();
                if (targetScreen === 'leaderboard') renderLeaderboard();
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const s = document.getElementById(id);
            s.classList.add('active');
            s.classList.add('animate-up');
        }

        function startWizard() {
            document.getElementById('main-header').style.display = 'none';
            document.getElementById('bottom-nav').style.display = 'none';
            wizardStep = 1;
            document.getElementById('wizard-title').innerText = "Language to learn";
            renderLangButtons();
            showScreen('wizard-screen');
        }

        function renderLangButtons() {
            const grid = document.getElementById('lang-grid');
            grid.innerHTML = '';
            LANGUAGES.forEach(lang => {
                if (wizardStep === 1 && lang.id === 0) return;
                if (wizardStep === 2 && lang.id === state.sourceLang) return;
                const btn = document.createElement('div');
                btn.className = 'lang-btn glass';
                btn.innerHTML = `<span class="emoji">${lang.emoji}</span><span>${lang.name}</span>`;
                btn.onclick = () => handleLangSelect(lang.id);
                grid.appendChild(btn);
            });
        }

        async function handleLangSelect(id) {
            if (wizardStep === 1) {
                state.sourceLang = id; wizardStep = 2;
                document.getElementById('wizard-title').innerText = "Your native language";
                triggerAnimation('wizard-screen');
                renderLangButtons();
            } else {
                state.targetLang = id; saveState();
                await fetchDatabase(state.mode);
            }
        }

        async function loadQuestion() {
            if (dbMatrix.length === 0) return;
            canAnswer = true;
            currentWordIndex = Math.floor(Math.random() * dbMatrix.length);
            const row = dbMatrix[currentWordIndex];
            
            let correctOpt = (row[state.targetLang] || "N/A").replace(/\*/g, '');
            let questionWord = row[state.sourceLang] || "N/A";
            currentRawTextForSpeech = questionWord.replace(/\*/g, '');
            
            const srcName = LANGUAGES.find(l => l.id === state.sourceLang).name;
            const tgtName = LANGUAGES.find(l => l.id === state.targetLang).name;
            document.getElementById('translation-direction').innerText = `${srcName} → ${tgtName}`;
            
            let displayHTML = questionWord;
            if (displayHTML.includes('*')) displayHTML = displayHTML.replace(/\*(.*?)\*/g, '<span class="highlight-word">$1</span>');
            document.getElementById('word-display').innerHTML = displayHTML;
            
            let wrongOpts = [];
            while (wrongOpts.length < 3) {
                let r = Math.floor(Math.random() * dbMatrix.length);
                let wOpt = (dbMatrix[r][state.targetLang] || "").replace(/\*/g, '');
                if (wOpt !== correctOpt && !wrongOpts.includes(wOpt)) wrongOpts.push(wOpt);
            }
            let allOpts = [correctOpt, ...wrongOpts].sort(() => Math.random() - 0.5);
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            allOpts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn glass';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, correctOpt);
                container.appendChild(btn);
            });

            if(state.ttsOn) {
                const shortLang = LANGUAGES.find(l => l.id === state.sourceLang).ttsCode;
                setTimeout(() => playTTS(currentRawTextForSpeech, shortLang), 300);
            }
        }

        function checkAnswer(btn, selected, correct) {
            if (!canAnswer) return;
            canAnswer = false;
            const isCorrect = selected === correct;
            const haptic = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback;

            if (isCorrect) {
                if(haptic) haptic.notificationOccurred('success');
                playSfx('correct');
                btn.classList.add('correct');
                
                state.streak++;
                if (state.streak > state.bestStreak) state.bestStreak = state.streak;
                state.totalCorrect++;
                
                let baseXP = (state.mode === 'sentence') ? XP_BASE_SENTENCE : XP_BASE_WORD;
                let bonusMultiplier = Math.min(Math.floor(state.streak / 4) * 0.2, 1.0); 
                let finalXP = Math.round(baseXP * (1 + bonusMultiplier));
                
                state.score += finalXP;
            } else {
                if(haptic) haptic.notificationOccurred('error');
                playSfx('wrong');
                btn.classList.add('wrong');
                state.streak = 0;
                state.totalWrong++;
                
                let penaltyXP = (state.mode === 'sentence') ? XP_PENALTY_SENTENCE : XP_PENALTY_WORD;
                state.score = Math.max(0, state.score - penaltyXP);
            }
            saveState(); updateXPUI();
            setTimeout(() => loadQuestion(), 1200);
        }

        function replayAudio() {
            const shortLang = LANGUAGES.find(l => l.id === state.sourceLang).ttsCode;
            playTTS(currentRawTextForSpeech, shortLang);
        }

        // ---------- Leaderboard ----------
        function renderLeaderboard() {
            const container = document.getElementById('leaderboard-list');
            container.innerHTML = '';
            
            let users = [
                { name: "Alex Turing", xp: 12500, avatar: "👨‍🚀", isMe: false },
                { name: "Sarah Connor", xp: 9800, avatar: "👩‍🎤", isMe: false },
                { name: "Max Payne", xp: 8400, avatar: "🕵️‍♂️", isMe: false },
                { name: "Nina Williams", xp: 7200, avatar: "🦸‍♀️", isMe: false },
                { name: "Leo Messi", xp: 6100, avatar: "🥷", isMe: false },
                { name: "You", xp: state.score, avatar: "😎", isMe: true } 
            ];

            users.sort((a, b) => b.xp - a.xp);

            users.forEach((user, index) => {
                const rank = index + 1;
                let rankClass = '';
                if (rank === 1) rankClass = 'gold';
                else if (rank === 2) rankClass = 'silver';
                else if (rank === 3) rankClass = 'bronze';

                const item = document.createElement('div');
                item.className = `lb-item glass ${user.isMe ? 'is-me' : ''}`;
                
                item.innerHTML = `
                    <div class="lb-rank ${rankClass}">#${rank}</div>
                    <div class="lb-avatar">${user.avatar}</div>
                    <div class="lb-info">
                        <span class="lb-name">${user.name}</span>
                        <span class="lb-xp">${user.xp.toLocaleString()} XP</span>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // ---------- Dashboard & Charts ----------
        function renderDashboard() {
            document.getElementById('dash-level').innerText = getLevel(state.score);
            document.getElementById('dash-xp').innerText = state.score;
            document.getElementById('dash-best-streak').innerText = state.bestStreak;
            const total = state.totalCorrect + state.totalWrong;
            document.getElementById('dash-accuracy').innerText = total > 0 ? Math.round((state.totalCorrect / total) * 100) + '%' : '0%';
            drawWeeklyChart(); renderActivityHeatmap();
        }

        function drawWeeklyChart() {
            const canvas = document.getElementById('weekly-chart');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            const w = rect.width, h = rect.height;
            ctx.clearRect(0, 0, w, h);
            
            const now = new Date();
            const weeklyValues = [];
            const labels = [];
            const daysArr = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
            
            for (let i = 6; i >= 0; i--) {
                let d = new Date();
                d.setDate(now.getDate() - i);
                let mKey = `${d.getFullYear()}-${d.getMonth()}`;
                let wasActive = (state.usageData[mKey] && state.usageData[mKey].includes(d.getDate())) ? 1 : 0;
                weeklyValues.push(wasActive ? 10 : 1);
                labels.push(daysArr[d.getDay()]);
            }
            
            const barW = (w - (weeklyValues.length * 8)) / weeklyValues.length;
            const maxVal = 10;
            
            weeklyValues.forEach((val, i) => {
                const barH = (val / maxVal) * (h - 25);
                const x = 5 + i * (barW + 8);
                const y = h - 20 - barH;
                
                ctx.fillStyle = val > 1 ? 'rgba(59, 130, 246, 0.8)' : 'rgba(255, 255, 255, 0.1)';
                ctx.beginPath();
                if(ctx.roundRect) ctx.roundRect(x, y, barW, barH > 0 ? barH : 4, [4, 4, 4, 4]);
                else ctx.rect(x, y, barW, barH > 0 ? barH : 4);
                ctx.fill();
                
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(labels[i], x + barW/2, h - 5);
            });
        }

        function renderActivityHeatmap() {
            const grid = document.getElementById('activity-grid');
            grid.innerHTML = '';
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('month-title').innerText = `${monthNames[month]} Activity`;
            
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const mKey = `${year}-${month}`;
            const activeDays = state.usageData[mKey] || [];
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'activity-day';
                dayEl.innerText = i;
                if (activeDays.includes(i)) dayEl.classList.add('active');
                grid.appendChild(dayEl);
            }
        }

        // ---------- Settings ----------
        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }
        function toggleSound() {
            state.soundOn = !state.soundOn; saveState();
            document.getElementById('sound-toggle').innerText = state.soundOn ? "Sound Effects: ON" : "Sound Effects: OFF";
        }
        function toggleTTS() {
            state.ttsOn = !state.ttsOn; saveState();
            document.getElementById('tts-toggle').innerText = state.ttsOn ? "AI Pronunciation: ON" : "AI Pronunciation: OFF";
        }
        function resetLanguages() {
            state.sourceLang = null; state.targetLang = null;
            localStorage.removeItem('sourceLang'); localStorage.removeItem('targetLang');
            toggleSettings(); startWizard();
        }
        function resetScore() {
            state.score = 0; state.streak = 0; state.bestStreak = 0;
            state.totalCorrect = 0; state.totalWrong = 0; state.usageData = {};
            saveState(); updateXPUI(); toggleSettings();
        }

        window.onload = () => {
            if(window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready(); tg.expand();
                tg.setHeaderColor('#090a0f'); 
                tg.setBackgroundColor('#090a0f');
            }
            init();
        };
    </script>
</body>
