<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyLangQuiz Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- Premium iOS-Style Dark Theme --- */
        :root {
            --bg-dark: #050505;
            --glass-bg: rgba(25, 25, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #0a84ff;
            --success: #32d74b;
            --danger: #ff453a;
            --text-main: #ffffff;
            --text-sec: #8e8e93;
            --highlight: #ffd60a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-dark); color: var(--text-main); 
            height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; 
            background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050505 70%);
        }

        .app-container { width: 100%; max-width: 420px; height: 100vh; max-height: 850px; display: flex; flex-direction: column; position: relative; padding: 20px; padding-bottom: 90px; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; margin-bottom: 20px; }
        .stats-group { display: flex; gap: 20px; }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-size: 18px; font-weight: 700; }
        .stat-label { font-size: 11px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1px; }
        .settings-btn { font-size: 22px; background: none; border: none; color: var(--text-sec); cursor: pointer; }

        .screen { display: none; flex-direction: column; height: 100%; animation: fade 0.4s ease; overflow-y: auto;}
        .screen.active { display: flex; }

        /* Wizard */
        .wizard-title { text-align: center; font-size: 22px; font-weight: 600; margin-bottom: 25px; }
        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; overflow-y: auto; padding-bottom: 20px; }
        .lang-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 18px; padding: 20px 10px; color: var(--text-main); font-size: 16px; font-weight: 500; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: all 0.2s; }
        .lang-btn .emoji { font-size: 32px; }
        .lang-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }

        /* Quiz UI */
        .question-card { padding: 30px 20px; text-align: center; margin-bottom: 20px; position: relative; }
        .question-label { font-size: 12px; color: var(--text-sec); margin-bottom: 15px; letter-spacing: 1px; text-transform: uppercase; }
        
        .word-wrapper { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .question-word { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; line-height: 1.4; }
        .highlight-word { color: var(--highlight); border-bottom: 2px dashed var(--highlight); padding-bottom: 2px; }
        
        .speaker-btn { background: rgba(10, 132, 255, 0.15); border: 1px solid var(--primary); color: var(--primary); width: 45px; height: 45px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.2s; margin-top: 10px; }
        .speaker-btn:active { transform: scale(0.9); background: var(--primary); color: white; }

        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-main); padding: 18px 20px; border-radius: 18px; font-size: 17px; font-weight: 500; text-align: center; cursor: pointer; transition: all 0.3s; }
        .option-btn.correct { background: rgba(50, 215, 75, 0.15); border-color: var(--success); box-shadow: 0 0 20px rgba(50,215,75,0.2); transform: translateY(-3px); }
        .option-btn.wrong { background: rgba(255, 69, 58, 0.15); border-color: var(--danger); animation: shake 0.4s; }

        /* --- Bottom Navigation --- */
        .bottom-nav { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); display: none; padding: 8px; gap: 10px; z-index: 50; }
        .nav-btn { flex: 1; padding: 14px; background: transparent; border: none; color: var(--text-sec); font-size: 15px; font-weight: 600; border-radius: 16px; cursor: pointer; transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .nav-btn.active { background: rgba(255, 255, 255, 0.1); color: var(--text-main); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        /* Settings */
        #settings-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px; animation: fade 0.3s; }
        .modal-content { width: 100%; max-width: 350px; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .modal-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white; padding: 15px; border-radius: 14px; font-size: 16px; cursor: pointer; }
        .close-btn { background: var(--primary); border: none; color: white; padding: 15px; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error-box { display: none; color: var(--danger); background: rgba(255, 69, 58, 0.1); border: 1px solid var(--danger); padding: 15px; border-radius: 12px; margin-top: 20px; font-size: 14px; }

        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-6px);} 75% {transform: translateX(6px);} }
        .loader { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <div class="header glass" id="main-header" style="display: none;">
            <div class="stats-group">
                <div class="stat-item"><span class="stat-val" id="score-display">0</span><span class="stat-label">Score</span></div>
                <div class="stat-item"><span class="stat-val" style="color: #ff9f0a;" id="streak-display">0 🔥</span><span class="stat-label">Streak</span></div>
            </div>
            <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
        </div>

        <!-- 1. Loading / Error Screen -->
        <div id="loading-screen" class="screen active" style="justify-content: center; text-align: center;">
            <div class="loader" id="spinner"></div>
            <h3 id="loading-text" style="color: var(--text-sec); font-weight: 500;">Connecting...</h3>
            <div id="error-box" class="error-box"></div>
        </div>

        <!-- 2. Wizard Screen -->
        <div id="wizard-screen" class="screen">
            <h2 class="wizard-title" id="wizard-title">Select Source Language</h2>
            <div class="lang-grid" id="lang-grid"></div>
        </div>

        <!-- 3. Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div class="question-card glass">
                <div class="question-label" id="translation-direction">...</div>
                <div class="word-wrapper">
                    <div class="question-word" id="word-display">...</div>
                    <button class="speaker-btn" id="speaker-btn" onclick="replayAudio()">🔊</button>
                </div>
            </div>
            <div class="options-grid" id="options-container"></div>
        </div>

        <!-- Bottom Navigation for Modes -->
        <div class="bottom-nav glass" id="bottom-nav">
            <button class="nav-btn active" id="nav-word" onclick="switchMode('word')">📝 Words</button>
            <button class="nav-btn" id="nav-sentence" onclick="switchMode('sentence')">💬 Sentences</button>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal">
            <div class="modal-content glass">
                <h2 style="text-align: center; margin-bottom: 10px;">Settings</h2>
                <button class="modal-btn" id="sound-toggle" onclick="toggleSound()">🔊 Sound: ON</button>
                <button class="modal-btn" id="tts-toggle" onclick="toggleTTS()">🗣️ Voice Auto-Play: ON</button>
                <button class="modal-btn" onclick="resetLanguages()">🌐 Change Languages</button>
                <button class="modal-btn" style="background: rgba(255, 69, 58, 0.2); border-color: var(--danger);" onclick="resetScore()">🗑️ Reset Score</button>
                <button class="close-btn" onclick="toggleSettings()">Close</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxaFlDv6NHyQBZS1B5r8yu_0qwxU74cPNvm4YpVaLenCXleOQIDcQelXCDYVlb9wuVQ/exec'; 
        
        // زبان روسی با آیدی 8 اضافه شد
        const LANGUAGES = [
            { id: 0, name: "فارسی", emoji: "🇮🇷", ttsCode: "fa-IR" },
            { id: 1, name: "English", emoji: "🇬🇧", ttsCode: "en-GB" },
            { id: 2, name: "日本語", emoji: "🇯🇵", ttsCode: "ja-JP" },
            { id: 3, name: "中文", emoji: "🇨🇳", ttsCode: "zh-CN" },
            { id: 4, name: "Deutsch", emoji: "🇩🇪", ttsCode: "de-DE" },
            { id: 5, name: "हिन्दी", emoji: "🇮🇳", ttsCode: "hi-IN" },
            { id: 6, name: "Español", emoji: "🇪🇸", ttsCode: "es-ES" },
            { id: 7, name: "العربية", emoji: "🇸🇦", ttsCode: "ar-SA" },
            { id: 8, name: "Русский", emoji: "🇷🇺", ttsCode: "ru-RU" }
        ];

        let dbMatrix = [];

        let state = {
            score: parseInt(localStorage.getItem('userScore')) || 0,
            streak: parseInt(localStorage.getItem('userStreak')) || 0,
            sourceLang: localStorage.getItem('sourceLang') !== null ? parseInt(localStorage.getItem('sourceLang')) : null,
            targetLang: localStorage.getItem('targetLang') !== null ? parseInt(localStorage.getItem('targetLang')) : null,
            soundOn: localStorage.getItem('soundOn') !== 'false',
            ttsOn: localStorage.getItem('ttsOn') !== 'false',
            mode: 'word' // حالت پیش‌فرض بازی
        };

        let wizardStep = 1;
        let currentWordIndex = -1;
        let canAnswer = true;
        let currentRawTextForSpeech = ""; 

        // === Audio & TTS System ===
        function playSound(type) {
            if (!state.soundOn) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                
                if (type === 'click') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(300, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.04);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
                    osc.start(); osc.stop(ctx.currentTime + 0.04);
                } else if (type === 'correct') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(400, ctx.currentTime);
                    osc.frequency.setValueAtTime(600, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                    osc.start(); osc.stop(ctx.currentTime + 0.2);
                }
            } catch (e) {}
        }

        function speakText(text, langId) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = LANGUAGES.find(l => l.id === langId).ttsCode;
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function replayAudio() {
            playSound('click');
            if (currentRawTextForSpeech) speakText(currentRawTextForSpeech, state.sourceLang);
        }

        // === Init & Fetching Engine ===
        async function init() {
            updateStatsUI();
            document.getElementById('sound-toggle').innerText = state.soundOn ? "🔊 Sound: ON" : "🔇 Sound: OFF";
            document.getElementById('tts-toggle').innerText = state.ttsOn ? "🗣️ Voice Auto-Play: ON" : "🗣️ Voice Auto-Play: OFF";

            if (state.sourceLang !== null && state.targetLang !== null) {
                // زبان‌ها قبلا انتخاب شده، مستقیما دیتا را می‌گیریم
                await fetchDatabase(state.mode);
            } else {
                startWizard();
            }
        }

        async function fetchDatabase(mode) {
            document.getElementById('loading-text').innerText = `Loading ${mode === 'word' ? 'Words' : 'Sentences'}...`;
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('error-box').style.display = 'none';
            showScreen('loading-screen');
            document.getElementById('bottom-nav').style.display = 'none';
            document.getElementById('main-header').style.display = 'none';

            try {
                if(API_URL.includes('script.google.com')) {
                    // ارسال پارامتر mode به بک‌اند
                    const fetchUrl = `${API_URL}${API_URL.includes('?') ? '&' : '?'}mode=${mode}`;
                    const response = await fetch(fetchUrl);
                    const data = await response.json();
                    
                    if(data && data.length > 0) {
                        dbMatrix = data;
                        document.getElementById('main-header').style.display = 'flex';
                        document.getElementById('bottom-nav').style.display = 'flex';
                        showScreen('quiz-screen');
                        loadQuestion();
                        return true;
                    } else {
                        showError(`تب دیتابیس برای ${mode} در گوگل شیت خالی است.`);
                        return false;
                    }
                } else {
                    showError("لینک گوگل اسکریپت (API_URL) را در کد قرار نداده‌اید!");
                    return false;
                }
            } catch (e) { 
                showError("خطا در ارتباط با سرور. لطفا اینترنت را بررسی کنید.");
                return false;
            }
        }

        // --- Switch Game Mode (Bottom Nav) ---
        async function switchMode(newMode) {
            if (state.mode === newMode) return;
            playSound('click');
            state.mode = newMode;
            
            // Update UI
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + newMode).classList.add('active');
            
            // Fetch new data for the selected mode
            await fetchDatabase(newMode);
        }

        function showError(msg) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('loading-text').style.display = 'none';
            const errBox = document.getElementById('error-box');
            errBox.innerText = msg;
            errBox.style.display = 'block';
            // Show nav so they can switch back if a tab is empty
            document.getElementById('bottom-nav').style.display = 'flex';
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // === Wizard ===
        function startWizard() {
            document.getElementById('main-header').style.display = 'none';
            document.getElementById('bottom-nav').style.display = 'none';
            wizardStep = 1;
            document.getElementById('wizard-title').innerText = "Step 1: Question Language";
            renderLangButtons();
            showScreen('wizard-screen');
        }

        function renderLangButtons() {
            const grid = document.getElementById('lang-grid');
            grid.innerHTML = '';
            LANGUAGES.forEach(lang => {
                if (wizardStep === 2 && lang.id === state.sourceLang) return; 
                const btn = document.createElement('button');
                btn.className = 'lang-btn';
                btn.innerHTML = `<span class="emoji">${lang.emoji}</span><span>${lang.name}</span>`;
                btn.onclick = () => handleLangSelect(lang.id);
                grid.appendChild(btn);
            });
        }

        async function handleLangSelect(id) {
            playSound('click');
            if (wizardStep === 1) {
                state.sourceLang = id; wizardStep = 2;
                document.getElementById('wizard-title').innerText = "Step 2: Answer Language";
                renderLangButtons();
            } else {
                state.targetLang = id; saveState();
                await fetchDatabase(state.mode);
            }
        }

        // === Game Engine ===
        function loadQuestion() {
            if(dbMatrix.length === 0) return; 
            
            canAnswer = true;
            let newIndex;
            do { newIndex = Math.floor(Math.random() * dbMatrix.length); } 
            while (newIndex === currentWordIndex && dbMatrix.length > 1);
            currentWordIndex = newIndex;
            
            const row = dbMatrix[currentWordIndex];
            
            // Text Processing
            let rawCorrectOpt = row[state.targetLang] || "N/A";
            let correctOpt = rawCorrectOpt.replace(/\*/g, ''); 
            
            let questionWord = row[state.sourceLang] || "N/A";
            currentRawTextForSpeech = questionWord.replace(/\*/g, '');
            
            let displayHTML = questionWord;
            if (displayHTML.includes('*')) {
                displayHTML = displayHTML.replace(/\*(.*?)\*/g, '<span class="highlight-word">$1</span>');
            }

            const srcName = LANGUAGES.find(l => l.id === state.sourceLang).name;
            const tgtName = LANGUAGES.find(l => l.id === state.targetLang).name;
            document.getElementById('translation-direction').innerText = `${srcName} ➔ ${tgtName}`;
            document.getElementById('word-display').innerHTML = displayHTML;

            if (state.ttsOn) speakText(currentRawTextForSpeech, state.sourceLang);

            // Generate Options
            let wrongOpts = [];
            let attempts = 0;
            while(wrongOpts.length < 3 && attempts < 100) {
                let rRow = dbMatrix[Math.floor(Math.random() * dbMatrix.length)];
                let wOpt = (rRow[state.targetLang] || "").replace(/\*/g, '');
                if (wOpt && wOpt !== correctOpt && !wrongOpts.includes(wOpt)) {
                    wrongOpts.push(wOpt);
                }
                attempts++;
            }
            while(wrongOpts.length < 3) wrongOpts.push("---");

            let allOpts = [correctOpt, ...wrongOpts].sort(() => Math.random() - 0.5);

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            allOpts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, correctOpt);
                container.appendChild(btn);
            });
        }

        function checkAnswer(btn, selected, correct) {
            if(!canAnswer) return;
            canAnswer = false;

            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.style.pointerEvents = 'none');

            if(selected === correct) {
                playSound('correct');
                btn.classList.add('correct');
                state.score += 100; state.streak += 1;
            } else {
                playSound('wrong');
                btn.classList.add('wrong');
                state.streak = 0;
                allBtns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
            }

            saveState(); updateStatsUI();
            setTimeout(() => { loadQuestion(); }, 1600);
        }

        // === Settings ===
        function updateStatsUI() {
            document.getElementById('score-display').innerText = state.score;
            document.getElementById('streak-display').innerText = state.streak + " 🔥";
        }

        function saveState() {
            localStorage.setItem('userScore', state.score);
            localStorage.setItem('userStreak', state.streak);
            if(state.sourceLang !== null) localStorage.setItem('sourceLang', state.sourceLang);
            if(state.targetLang !== null) localStorage.setItem('targetLang', state.targetLang);
            localStorage.setItem('soundOn', state.soundOn);
            localStorage.setItem('ttsOn', state.ttsOn);
        }

        function toggleSettings() {
            playSound('click');
            const modal = document.getElementById('settings-modal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        function toggleSound() {
            state.soundOn = !state.soundOn; saveState(); playSound('click');
            document.getElementById('sound-toggle').innerText = state.soundOn ? "🔊 Sound: ON" : "🔇 Sound: OFF";
        }
        
        function toggleTTS() {
            state.ttsOn = !state.ttsOn; saveState(); playSound('click');
            document.getElementById('tts-toggle').innerText = state.ttsOn ? "🗣️ Voice Auto-Play: ON" : "🗣️ Voice Auto-Play: OFF";
        }

        function resetLanguages() {
            playSound('click');
            state.sourceLang = null; state.targetLang = null;
            localStorage.removeItem('sourceLang'); localStorage.removeItem('targetLang');
            toggleSettings(); startWizard();
        }

        function resetScore() {
            playSound('click'); state.score = 0; state.streak = 0;
            saveState(); updateStatsUI(); toggleSettings();
        }

        window.onload = () => {
            const tg = window.Telegram.WebApp;
            tg.ready(); tg.expand();
            tg.setHeaderColor('#050505'); tg.setBackgroundColor('#050505');
            init();
        };
    </script>
</body>
</html>
