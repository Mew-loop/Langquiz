<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyLangQuiz Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --glass-bg: rgba(25, 25, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #0a84ff;
            --success: #32d74b;
            --danger: #ff453a;
            --text-main: #ffffff;
            --text-sec: #8e8e93;
            --highlight: #ffd60a;
            --gold: #ffd60a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-dark); color: var(--text-main); 
            min-height: 100vh; 
            min-height: var(--tg-viewport-height, 100vh); 
            display: flex; justify-content: center; align-items: center; 
            background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050505 70%);
            overflow: hidden;
        }

        .app-container { 
            width: 100%; max-width: 420px; 
            height: 100vh; 
            height: var(--tg-viewport-height, 100vh); 
            max-height: 850px; display: flex; flex-direction: column; position: relative; padding: 20px; padding-bottom: 90px; 
        }
        .glass { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; margin-bottom: 8px; flex-shrink: 0; position: relative; }
        .stats-group { display: flex; gap: 20px; }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-size: 18px; font-weight: 700; }
        .stat-label { font-size: 11px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1px; }
        .settings-btn { font-size: 22px; background: none; border: none; color: var(--text-sec); cursor: pointer; }

        /* SR Progress Bar */
        .sr-progress { display: flex; gap: 8px; margin-bottom: 16px; padding: 0 4px; flex-shrink: 0; }
        .sr-pill { flex: 1; text-align: center; padding: 6px 4px; border-radius: 12px; font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.05); color: var(--text-sec); border: 1px solid var(--glass-border); }
        .sr-pill.new { background: rgba(10, 132, 255, 0.12); color: var(--primary); border-color: rgba(10,132,255,0.2); }
        .sr-pill.due { background: rgba(255, 159, 10, 0.12); color: #ff9f0a; border-color: rgba(255,159,10,0.2); }
        .sr-pill.mastered { background: rgba(50, 215, 75, 0.12); color: var(--success); border-color: rgba(50,215,75,0.2); }

        .screen { display: none; flex-direction: column; height: 100%; animation: fade 0.4s ease; overflow-y: auto;}
        .screen.active { display: flex; }

        /* Wizard */
        .wizard-title { text-align: center; font-size: 22px; font-weight: 600; margin-bottom: 25px; }
        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; overflow-y: auto; padding-bottom: 20px; }
        .lang-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 18px; padding: 20px 10px; color: var(--text-main); font-size: 16px; font-weight: 500; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: all 0.2s; }
        .lang-btn .emoji { font-size: 32px; }
        .lang-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }

        /* Quiz UI */
        .question-card { padding: 30px 20px; text-align: center; margin-bottom: 20px; position: relative; flex-shrink: 0; transition: border-color 0.3s; }
        .question-card.new-word { border-color: rgba(10, 132, 255, 0.25); }
        .question-card.mastered { border-color: rgba(255, 214, 10, 0.25); }
        .question-label { font-size: 12px; color: var(--text-sec); margin-bottom: 15px; letter-spacing: 1px; text-transform: uppercase; }

        .box-indicator {
            position: absolute;
            top: 12px;
            left: 12px;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            color: var(--text-sec);
            letter-spacing: 0.5px;
        }
        .box-indicator.box-0 { background: rgba(10, 132, 255, 0.15); color: var(--primary); }
        .box-indicator.box-1 { background: rgba(175, 82, 222, 0.15); color: #af52de; }
        .box-indicator.box-2 { background: rgba(255, 159, 10, 0.15); color: #ff9f0a; }
        .box-indicator.box-3 { background: rgba(255, 214, 10, 0.15); color: var(--gold); }
        .box-indicator.box-4 { background: rgba(50, 215, 75, 0.15); color: var(--success); }
        .box-indicator.box-5, .box-indicator.box-6 { background: rgba(255, 215, 0, 0.2); color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }

        .word-wrapper { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .question-word { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; line-height: 1.4; }
        .highlight-word { color: var(--highlight); border-bottom: 2px dashed var(--highlight); padding-bottom: 2px; }

        .speaker-btn { background: rgba(10, 132, 255, 0.15); border: 1px solid var(--primary); color: var(--primary); width: 45px; height: 45px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.2s; margin-top: 10px; }
        .speaker-btn:active { transform: scale(0.9); background: var(--primary); color: white; }
        .speaker-btn.offline { border-color: var(--text-sec); color: var(--text-sec); background: rgba(142,142,147,0.15); }

        .options-grid { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; padding-bottom: 20px; }
        .option-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-main); padding: 18px 20px; border-radius: 18px; font-size: 17px; font-weight: 500; text-align: center; cursor: pointer; transition: all 0.3s; flex-shrink: 0; }
        .option-btn.correct { background: rgba(50, 215, 75, 0.15); border-color: var(--success); box-shadow: 0 0 20px rgba(50,215,75,0.2); transform: translateY(-3px); }
        .option-btn.wrong { background: rgba(255, 69, 58, 0.15); border-color: var(--danger); animation: shake 0.4s; }

        /* SR Toast */
        .sr-toast {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            padding: 16px 32px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 700;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
        }
        .sr-toast.show {
            animation: toastPop 0.6s ease forwards;
        }
        .sr-toast.level-up { background: rgba(50, 215, 75, 0.9); color: #000; }
        .sr-toast.reset { background: rgba(255, 69, 58, 0.9); color: #fff; }
        .sr-toast.new-master { background: linear-gradient(135deg, #ffd700, #ff9f0a); color: #000; }

        @keyframes toastPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            40% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        @keyframes toastOut {
            to { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
        }

        /* Bottom Navigation */
        .bottom-nav { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); display: none; padding: 8px; gap: 10px; z-index: 50; }
        .nav-btn { flex: 1; padding: 14px; background: transparent; border: none; color: var(--text-sec); font-size: 15px; font-weight: 600; border-radius: 16px; cursor: pointer; transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .nav-btn.active { background: rgba(255, 255, 255, 0.1); color: var(--text-main); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        /* Settings */
        #settings-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px; animation: fade 0.3s; }
        .modal-content { width: 100%; max-width: 350px; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .modal-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white; padding: 15px; border-radius: 14px; font-size: 16px; cursor: pointer; }
        .close-btn { background: var(--primary); border: none; color: white; padding: 15px; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error-box { display: none; color: var(--danger); background: rgba(255, 69, 58, 0.1); border: 1px solid var(--danger); padding: 15px; border-radius: 12px; margin-top: 20px; font-size: 14px; }
        .offline-badge { display: none; position: absolute; top: 12px; right: 12px; background: rgba(255, 159, 10, 0.15); color: #ff9f0a; border: 1px solid rgba(255,159,10,0.3); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }

        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-6px);} 75% {transform: translateX(6px);} }
        .loader { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
<base target="_blank">
</head>
<body>
    <audio id="tts-player" style="display: none;"></audio>
    <div class="sr-toast" id="sr-toast"></div>

    <div class="app-container">
        <!-- Header -->
        <div class="header glass" id="main-header" style="display: none;">
            <div class="stats-group">
                <div class="stat-item"><span class="stat-val" id="score-display">0</span><span class="stat-label">Score</span></div>
                <div class="stat-item"><span class="stat-val" style="color: #ff9f0a;" id="streak-display">0 🔥</span><span class="stat-label">Streak</span></div>
            </div>
            <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
            <div class="offline-badge" id="offline-badge">📴 Offline</div>
        </div>

        <!-- SR Progress -->
        <div class="sr-progress" id="sr-progress" style="display: none;">
            <div class="sr-pill new" id="pill-new">🆕 New: 0</div>
            <div class="sr-pill due" id="pill-due">📦 Due: 0</div>
            <div class="sr-pill mastered" id="pill-mastered">✅ Mastered: 0</div>
        </div>

        <!-- 1. Loading -->
        <div id="loading-screen" class="screen active" style="justify-content: center; text-align: center;">
            <div class="loader" id="spinner"></div>
            <h3 id="loading-text" style="color: var(--text-sec); font-weight: 500;">Connecting...</h3>
            <div id="error-box" class="error-box"></div>
        </div>

        <!-- 2. Wizard Screen -->
        <div id="wizard-screen" class="screen">
            <h2 class="wizard-title" id="wizard-title">Select Source Language</h2>
            <div class="lang-grid" id="lang-grid"></div>
        </div>

        <!-- 3. Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div class="question-card glass" id="question-card">
                <div class="box-indicator" id="box-indicator">🆕 New</div>
                <div class="question-label" id="translation-direction">...</div>
                <div class="word-wrapper">
                    <div class="question-word" id="word-display">...</div>
                    <button class="speaker-btn" id="speaker-btn" onclick="replayAudio()">🔊</button>
                </div>
            </div>
            <div class="options-grid" id="options-container"></div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav glass" id="bottom-nav">
            <button class="nav-btn active" id="nav-word" onclick="switchMode('word')">📝 Words</button>
            <button class="nav-btn" id="nav-sentence" onclick="switchMode('sentence')">💬 Sentences</button>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal">
            <div class="modal-content glass">
                <h2 style="text-align: center; margin-bottom: 10px;">Settings</h2>
                <button class="modal-btn" id="sound-toggle" onclick="toggleSound()">🔊 Sound: ON</button>
                <button class="modal-btn" id="tts-toggle" onclick="toggleTTS()">🗣️ Voice Auto-Play: ON</button>
                <button class="modal-btn" onclick="resetLanguages()">🌐 Change Languages</button>
                <button class="modal-btn" style="background: rgba(255, 69, 58, 0.2); border-color: var(--danger);" onclick="resetScore()">🗑️ Reset Score</button>
                <button class="close-btn" onclick="toggleSettings()">Close</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxaFlDv6NHyQBZS1B5r8yu_0qwxU74cPNvm4YpVaLenCXleOQIDcQelXCDYVlb9wuVQ/exec'; 

        const LANGUAGES = [
            { id: 0, name: "فارسی", emoji: "🇮🇷", ttsCode: "fa" },
            { id: 1, name: "English", emoji: "🇬🇧", ttsCode: "en" },
            { id: 2, name: "日本語", emoji: "🇯🇵", ttsCode: "ja" },
            { id: 3, name: "中文", emoji: "🇨🇳", ttsCode: "zh-CN" },
            { id: 4, name: "Deutsch", emoji: "🇩🇪", ttsCode: "de" },
            { id: 5, name: "हिन्दी", emoji: "🇮🇳", ttsCode: "hi" },
            { id: 6, name: "Español", emoji: "🇪🇸", ttsCode: "es" },
            { id: 7, name: "العربية", emoji: "🇸🇦", ttsCode: "ar" },
            { id: 8, name: "Русский", emoji: "🇷🇺", ttsCode: "ru" }
        ];

        // --- IndexedDB ---
        const DB_NAME = 'LangQuizDB';
        const DB_VERSION = 2;
        let idb = null;

        async function openIDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onerror = () => reject(req.error);
                req.onsuccess = () => { idb = req.result; resolve(idb); };
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('dataCache')) {
                        db.createObjectStore('dataCache', { keyPath: 'key' });
                    }
                    if (!db.objectStoreNames.contains('wordStats')) {
                        db.createObjectStore('wordStats', { keyPath: 'wordKey' });
                    }
                };
            });
        }

        async function cacheData(key, data) {
            if (!idb) await openIDB();
            return new Promise((resolve, reject) => {
                const tx = idb.transaction('dataCache', 'readwrite');
                const store = tx.objectStore('dataCache');
                const req = store.put({ key, data, timestamp: Date.now() });
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
            });
        }

        async function getCachedData(key) {
            if (!idb) await openIDB();
            return new Promise((resolve) => {
                const tx = idb.transaction('dataCache', 'readonly');
                const store = tx.objectStore('dataCache');
                const req = store.get(key);
                req.onsuccess = () => resolve(req.result || null);
                req.onerror = () => resolve(null);
            });
        }

        function getCacheKey(mode, src, tgt) {
            return `${mode}_${src}_${tgt}`;
        }

        // --- Spaced Repetition (Leitner Box) ---
        const SR_INTERVALS = [0, 5*60*1000, 60*60*1000, 24*60*60*1000, 3*24*60*60*1000, 7*24*60*60*1000, 30*24*60*60*1000];
        const BOX_LABELS = ['🆕 New', '📦 Box 1', '📦 Box 2', '⭐ Box 3', '💎 Box 4', '👑 Box 5', '🏆 Mastered'];

        async function getWordStats(wordKey) {
            if (!idb) await openIDB();
            return new Promise((resolve) => {
                const tx = idb.transaction('wordStats', 'readonly');
                const store = tx.objectStore('wordStats');
                const req = store.get(wordKey);
                req.onsuccess = () => resolve(req.result || null);
                req.onerror = () => resolve(null);
            });
        }

        async function saveWordStats(stats) {
            if (!idb) await openIDB();
            return new Promise((resolve, reject) => {
                const tx = idb.transaction('wordStats', 'readwrite');
                const store = tx.objectStore('wordStats');
                const req = store.put(stats);
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
            });
        }

        function getWordKey(index) {
            return `${state.mode}_${state.sourceLang}_${state.targetLang}_${index}`;
        }

        async function selectNextWordIndex() {
            const now = Date.now();
            const newWords = [];
            const dueWords = [];

            for (let i = 0; i < dbMatrix.length; i++) {
                const key = getWordKey(i);
                const stats = await getWordStats(key);
                if (!stats) {
                    newWords.push({index: i});
                } else if (stats.nextReview <= now) {
                    dueWords.push({index: i, box: stats.box});
                }
            }

            if (newWords.length > 0) {
                return newWords[Math.floor(Math.random() * newWords.length)].index;
            }

            if (dueWords.length > 0) {
                dueWords.sort((a, b) => a.box - b.box);
                const topN = Math.min(3, dueWords.length);
                return dueWords[Math.floor(Math.random() * topN)].index;
            }

            return Math.floor(Math.random() * dbMatrix.length);
        }

        async function handleAnswerResult(isCorrect) {
            const key = getWordKey(currentWordIndex);
            let stats = await getWordStats(key) || {
                wordKey: key,
                box: 0,
                lastReviewed: 0,
                nextReview: 0,
                correctCount: 0,
                wrongCount: 0
            };

            stats.lastReviewed = Date.now();

            if (isCorrect) {
                stats.box = Math.min(stats.box + 1, 6);
                stats.correctCount++;
            } else {
                stats.box = 0;
                stats.wrongCount++;
            }

            const interval = SR_INTERVALS[stats.box];
            stats.nextReview = Date.now() + interval;

            await saveWordStats(stats);
            return stats;
        }

        async function getSRCounts() {
            let newCount = 0, dueCount = 0, masteredCount = 0;
            const now = Date.now();
            for (let i = 0; i < dbMatrix.length; i++) {
                const key = getWordKey(i);
                const stats = await getWordStats(key);
                if (!stats) {
                    newCount++;
                } else if (stats.box >= 5) {
                    masteredCount++;
                } else if (stats.nextReview <= now) {
                    dueCount++;
                }
            }
            return { newCount, dueCount, masteredCount };
        }

        async function updateSRProgressUI() {
            const counts = await getSRCounts();
            document.getElementById('pill-new').innerText = `🆕 New: ${counts.newCount}`;
            document.getElementById('pill-due').innerText = `📦 Due: ${counts.dueCount}`;
            document.getElementById('pill-mastered').innerText = `✅ Mastered: ${counts.masteredCount}`;
        }

        function updateBoxIndicator(stats) {
            const el = document.getElementById('box-indicator');
            const card = document.getElementById('question-card');
            if (!stats) {
                el.innerText = BOX_LABELS[0];
                el.className = 'box-indicator box-0';
                card.className = 'question-card glass new-word';
                return;
            }
            el.innerText = BOX_LABELS[Math.min(stats.box, 6)];
            el.className = `box-indicator box-${Math.min(stats.box, 6)}`;
            if (stats.box >= 5) {
                card.className = 'question-card glass mastered';
            } else {
                card.className = 'question-card glass';
            }
        }

        function showSRToast(isCorrect, newBox) {
            const toast = document.getElementById('sr-toast');
            toast.classList.remove('show', 'level-up', 'reset', 'new-master');

            if (isCorrect && newBox === 6) {
                toast.innerText = '🏆 Mastered!';
                toast.className = 'sr-toast new-master show';
            } else if (isCorrect) {
                toast.innerText = `📈 Level ${newBox}!`;
                toast.className = 'sr-toast level-up show';
            } else {
                toast.innerText = '↩️ Back to Box 0';
                toast.className = 'sr-toast reset show';
            }

            setTimeout(() => {
                toast.style.animation = 'toastOut 0.3s ease forwards';
                setTimeout(() => {
                    toast.classList.remove('show');
                    toast.style.animation = '';
                }, 300);
            }, 1200);
        }

        let dbMatrix = [];
        let isOffline = false;

        let state = {
            score: parseInt(localStorage.getItem('userScore')) || 0,
            streak: parseInt(localStorage.getItem('userStreak')) || 0,
            sourceLang: localStorage.getItem('sourceLang') !== null ? parseInt(localStorage.getItem('sourceLang')) : null,
            targetLang: localStorage.getItem('targetLang') !== null ? parseInt(localStorage.getItem('targetLang')) : null,
            soundOn: localStorage.getItem('soundOn') !== 'false',
            ttsOn: localStorage.getItem('ttsOn') !== 'false',
            mode: 'word'
        };

        let wizardStep = 1;
        let currentWordIndex = -1;
        let canAnswer = true;
        let currentRawTextForSpeech = ""; 

        let audioCtx = null;
        let mediaUnlocked = false;

        let availableVoices = [];
        function updateVoices() {
            if ('speechSynthesis' in window) {
                availableVoices = window.speechSynthesis.getVoices();
            }
        }
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = updateVoices;
            updateVoices();
        }

        function unlockMedia() {
            if (!mediaUnlocked) {
                if (!audioCtx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) audioCtx = new AudioContext();
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const player = document.getElementById('tts-player');
                player.play().catch(()=>{});
                if ('speechSynthesis' in window) {
                    const silent = new SpeechSynthesisUtterance('');
                    silent.volume = 0;
                    window.speechSynthesis.speak(silent);
                }
                mediaUnlocked = true;
            }
        }
        document.body.addEventListener('click', unlockMedia, { once: true });
        document.body.addEventListener('touchstart', unlockMedia, { once: true });

        function playGoogleTTS(text, shortLangCode) {
            const audioUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=${shortLangCode}&client=tw-ob&q=${encodeURIComponent(text)}`;
            const player = document.getElementById('tts-player');
            player.src = audioUrl;
            player.load();
            player.play().catch(e => {
                console.warn("Google TTS Blocked:", e);
                const btn = document.getElementById('speaker-btn');
                if (btn) {
                    btn.style.transform = 'scale(1.2)';
                    setTimeout(() => btn.style.transform = '', 200);
                }
            });
        }

        function speakText(text, langId) {
            if (!text || !state.ttsOn) return;
            const langObj = LANGUAGES.find(l => l.id === langId);

            let locale = langObj.ttsCode;
            if(locale === 'fa') locale = 'fa-IR';
            if(locale === 'en') locale = 'en-US';
            if(locale === 'ru') locale = 'ru-RU';

            if ('speechSynthesis' in window) {
                const voices = availableVoices.length > 0 ? availableVoices : window.speechSynthesis.getVoices();
                const hasVoice = voices.some(v => v.lang.startsWith(locale) || v.lang.startsWith(langObj.ttsCode));

                if (voices.length > 0 && !hasVoice) {
                    playGoogleTTS(text, langObj.ttsCode);
                    return;
                }

                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = locale;

                if (voices.length > 0) {
                    let bestVoice = voices.find(v => 
                        (v.lang.startsWith(locale) || v.lang.startsWith(langObj.ttsCode)) && 
                        (v.name.includes('Google') || v.name.includes('Premium') || v.name.includes('Online'))
                    );
                    if (!bestVoice) {
                        bestVoice = voices.find(v => 
                            (v.lang.startsWith(locale) || v.lang.startsWith(langObj.ttsCode)) && 
                            (v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Natural'))
                        );
                    }
                    if (!bestVoice) {
                        bestVoice = voices.find(v => v.lang.startsWith(locale) || v.lang.startsWith(langObj.ttsCode));
                    }
                    if (bestVoice) utterance.voice = bestVoice;
                }

                utterance.rate = 1.0; 
                utterance.pitch = 1.0; 
                utterance.onerror = () => playGoogleTTS(text, langObj.ttsCode);
                window.speechSynthesis.speak(utterance);

                setTimeout(() => {
                    if (!window.speechSynthesis.speaking && voices.length > 0) {
                        playGoogleTTS(text, langObj.ttsCode);
                    }
                }, 300);
            } else {
                playGoogleTTS(text, langObj.ttsCode);
            }
        }

        function playSound(type) {
            if (!state.soundOn || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;
                if (type === 'click') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.04);
                    gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
                    osc.start(now); osc.stop(now + 0.04);
                } else if (type === 'correct') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(400, now);
                    osc.frequency.setValueAtTime(600, now + 0.1);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(80, now + 0.2);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.2);
                    osc.start(now); osc.stop(now + 0.2);
                }
            } catch (e) { console.warn("Sound effect error:", e); }
        }

        function replayAudio() {
            playSound('click');
            if (currentRawTextForSpeech) speakText(currentRawTextForSpeech, state.sourceLang);
        }

        function updateOnlineStatus() {
            isOffline = !navigator.onLine;
            const badge = document.getElementById('offline-badge');
            if (badge) badge.style.display = isOffline ? 'block' : 'none';
            const speakerBtn = document.getElementById('speaker-btn');
            if (speakerBtn) {
                if (isOffline) speakerBtn.classList.add('offline');
                else speakerBtn.classList.remove('offline');
            }
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        async function init() {
            updateOnlineStatus();
            updateStatsUI();
            document.getElementById('sound-toggle').innerText = state.soundOn ? "🔊 Sound: ON" : "🔇 Sound: OFF";
            document.getElementById('tts-toggle').innerText = state.ttsOn ? "🗣️ Voice Auto-Play: ON" : "🗣️ Voice Auto-Play: OFF";

            if (state.sourceLang !== null && state.targetLang !== null) {
                await fetchDatabase(state.mode);
            } else {
                startWizard();
            }
        }

        async function fetchDatabase(mode) {
            document.getElementById('loading-text').innerText = `Loading ${mode === 'word' ? 'Words' : 'Sentences'}...`;
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('error-box').style.display = 'none';
            showScreen('loading-screen');
            document.getElementById('bottom-nav').style.display = 'none';
            document.getElementById('main-header').style.display = 'none';
            document.getElementById('sr-progress').style.display = 'none';

            const cacheKey = getCacheKey(mode, state.sourceLang, state.targetLang);
            let loadedFromCache = false;

            try {
                const cached = await getCachedData(cacheKey);
                if (cached && cached.data && cached.data.length > 0) {
                    dbMatrix = cached.data;
                    loadedFromCache = true;
                    document.getElementById('loading-text').innerText = 'Loading from cache...';
                }
            } catch(e) { console.warn('Cache read failed', e); }

            let networkSuccess = false;
            if (navigator.onLine && API_URL.includes('script.google.com')) {
                try {
                    const fetchUrl = `${API_URL}${API_URL.includes('?') ? '&' : '?'}mode=${mode}`;
                    const response = await fetch(fetchUrl);
                    const data = await response.json();
                    if (data && data.length > 0) {
                        dbMatrix = data;
                        networkSuccess = true;
                        try { await cacheData(cacheKey, data); } catch(e) { console.warn('Cache write failed', e); }
                    }
                } catch (e) { console.warn('Network fetch failed', e); }
            }

            if (dbMatrix.length > 0) {
                document.getElementById('main-header').style.display = 'flex';
                document.getElementById('bottom-nav').style.display = 'flex';
                document.getElementById('sr-progress').style.display = 'flex';
                showScreen('quiz-screen');
                await updateSRProgressUI();
                await loadQuestion();
                return true;
            } else {
                let msg = "دیتابیس گوگل شیت خالی است یا در دسترس نیست.";
                if (isOffline) msg = "شما آفلاین هستید و داده‌ای در حافظه پنهان نیست. لطفاً یک‌بار آنلاین شوید.";
                else if (!API_URL.includes('script.google.com')) msg = "لینک گوگل اسکریپت در کد قرار داده نشده است!";
                showError(msg);
                return false;
            }
        }

        function switchMode(newMode) {
            if (state.mode === newMode) return;
            playSound('click');
            state.mode = newMode;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + newMode).classList.add('active');
            fetchDatabase(newMode);
        }

        function showError(msg) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('loading-text').style.display = 'none';
            const errBox = document.getElementById('error-box');
            errBox.innerText = msg;
            errBox.style.display = 'block';
            document.getElementById('bottom-nav').style.display = 'flex';
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startWizard() {
            document.getElementById('main-header').style.display = 'none';
            document.getElementById('bottom-nav').style.display = 'none';
            document.getElementById('sr-progress').style.display = 'none';
            wizardStep = 1;
            document.getElementById('wizard-title').innerText = "Step 1: Question Language";
            renderLangButtons();
            showScreen('wizard-screen');
        }

        function renderLangButtons() {
            const grid = document.getElementById('lang-grid');
            grid.innerHTML = '';
            LANGUAGES.forEach(lang => {
                if (wizardStep === 1 && lang.id === 0) return;
                if (wizardStep === 2 && lang.id === state.sourceLang) return; 
                const btn = document.createElement('button');
                btn.className = 'lang-btn';
                btn.innerHTML = `<span class="emoji">${lang.emoji}</span><span>${lang.name}</span>`;
                btn.onclick = () => handleLangSelect(lang.id);
                grid.appendChild(btn);
            });
        }

        async function handleLangSelect(id) {
            playSound('click');
            if (wizardStep === 1) {
                state.sourceLang = id; wizardStep = 2;
                document.getElementById('wizard-title').innerText = "Step 2: Answer Language";
                renderLangButtons();
            } else {
                state.targetLang = id; saveState();
                await fetchDatabase(state.mode);
            }
        }

        async function loadQuestion() {
            if(dbMatrix.length === 0) return;
            canAnswer = true;

            currentWordIndex = await selectNextWordIndex();
            const stats = await getWordStats(getWordKey(currentWordIndex));
            updateBoxIndicator(stats);

            const row = dbMatrix[currentWordIndex];

            let rawCorrectOpt = row[state.targetLang] || "N/A";
            let correctOpt = rawCorrectOpt.replace(/\*/g, ''); 

            let questionWord = row[state.sourceLang] || "N/A";
            currentRawTextForSpeech = questionWord.replace(/\*/g, '');

            let displayHTML = questionWord;
            if (displayHTML.includes('*')) {
                displayHTML = displayHTML.replace(/\*(.*?)\*/g, '<span class="highlight-word">$1</span>');
            }

            const srcName = LANGUAGES.find(l => l.id === state.sourceLang).name;
            const tgtName = LANGUAGES.find(l => l.id === state.targetLang).name;
            document.getElementById('translation-direction').innerText = `${srcName} ➔ ${tgtName}`;
            document.getElementById('word-display').innerHTML = displayHTML;

            let wrongOpts = [];
            let attempts = 0;
            while(wrongOpts.length < 3 && attempts < 100) {
                let rRow = dbMatrix[Math.floor(Math.random() * dbMatrix.length)];
                let wOpt = (rRow[state.targetLang] || "").replace(/\*/g, '');
                if (wOpt && wOpt !== correctOpt && !wrongOpts.includes(wOpt)) {
                    wrongOpts.push(wOpt);
                }
                attempts++;
            }
            while(wrongOpts.length < 3) wrongOpts.push("---");

            let allOpts = [correctOpt, ...wrongOpts].sort(() => Math.random() - 0.5);

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            allOpts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, correctOpt);
                container.appendChild(btn);
            });

            if (state.ttsOn) {
                setTimeout(() => { speakText(currentRawTextForSpeech, state.sourceLang); }, 100);
            }
        }

        async function checkAnswer(btn, selected, correct) {
            if(!canAnswer) return;
            canAnswer = false;

            if ('speechSynthesis' in window) {
                const silent = new SpeechSynthesisUtterance('');
                silent.volume = 0;
                window.speechSynthesis.speak(silent);
            }

            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.style.pointerEvents = 'none');

            const isCorrect = selected === correct;

            if(isCorrect) {
                playSound('correct');
                btn.classList.add('correct');
                state.score += 100; state.streak += 1;
            } else {
                playSound('wrong');
                btn.classList.add('wrong');
                state.streak = 0;
                allBtns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
            }

            const newStats = await handleAnswerResult(isCorrect);
            showSRToast(isCorrect, newStats.box);
            await updateSRProgressUI();

            saveState(); updateStatsUI();
            setTimeout(() => { loadQuestion(); }, 1600);
        }

        function updateStatsUI() {
            document.getElementById('score-display').innerText = state.score;
            document.getElementById('streak-display').innerText = state.streak + " 🔥";
        }

        function saveState() {
            localStorage.setItem('userScore', state.score);
            localStorage.setItem('userStreak', state.streak);
            if(state.sourceLang !== null) localStorage.setItem('sourceLang', state.sourceLang);
            if(state.targetLang !== null) localStorage.setItem('targetLang', state.targetLang);
            localStorage.setItem('soundOn', state.soundOn);
            localStorage.setItem('ttsOn', state.ttsOn);
        }

        function toggleSettings() {
            playSound('click');
            const modal = document.getElementById('settings-modal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        function toggleSound() {
            state.soundOn = !state.soundOn; saveState(); playSound('click');
            document.getElementById('sound-toggle').innerText = state.soundOn ? "🔊 Sound: ON" : "🔇 Sound: OFF";
        }

        function toggleTTS() {
            state.ttsOn = !state.ttsOn; saveState(); playSound('click');
            document.getElementById('tts-toggle').innerText = state.ttsOn ? "🗣️ Voice Auto-Play: ON" : "🗣️ Voice Auto-Play: OFF";
        }

        function resetLanguages() {
            playSound('click');
            state.sourceLang = null; state.targetLang = null;
            localStorage.removeItem('sourceLang'); localStorage.removeItem('targetLang');
            if (idb) {
                try {
                    const tx = idb.transaction('dataCache', 'readwrite');
                    tx.objectStore('dataCache').clear();
                } catch(e) {}
            }
            toggleSettings(); startWizard();
        }

        function resetScore() {
            playSound('click'); state.score = 0; state.streak = 0;
            saveState(); updateStatsUI(); toggleSettings();
        }

        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', e => {
                    e.respondWith(fetch(e.request).catch(() => new Response('Offline', {status: 503})));
                });
            `;
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swUrl).catch(() => {});
        }

        window.onload = () => {
            const tg = window.Telegram.WebApp;
            tg.ready(); 
            tg.expand(); 
            tg.setHeaderColor('#050505'); 
            tg.setBackgroundColor('#050505');
            init();
        };
    </script>
</body>
